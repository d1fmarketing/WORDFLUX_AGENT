# WordFlux Production Nginx Configuration
# Place in /etc/nginx/sites-available/wordflux
# Architecture: Port 80 → Cockpit UI, Port 8080 → API (direct, programmatic access)

upstream wordflux_cockpit {
    server 127.0.0.1:8081;
    keepalive 32;
}

# ============================================
# COCKPIT UI - Port 80 (Main User Interface)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Increase buffer sizes for SSE and large payloads
    proxy_buffers 8 32k;
    proxy_buffer_size 64k;
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/wordflux-cockpit.access.log;
    error_log /var/log/nginx/wordflux-cockpit.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root - Cockpit UI
    location / {
        proxy_pass http://wordflux_cockpit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Server-Sent Events endpoint (special handling - no buffering)
    location /events/stream {
        proxy_pass http://wordflux_cockpit/events/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE critical settings - disable all buffering
        proxy_set_header Connection '';
        proxy_cache off;
        proxy_buffering off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;  # 24 hours for long-lived connections
        keepalive_timeout 90s;

        # Headers for SSE
        add_header Cache-Control "no-cache" always;
        add_header X-Accel-Buffering "no" always;
        add_header Content-Type "text/event-stream" always;
    }

    # API endpoints (board, agent, queue, health, etc.)
    location ~ ^/(health|board|agent|queue|events|kpis|me|cards|ai) {
        proxy_pass http://wordflux_cockpit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# NOTES FOR API PORT 8080
# ============================================
# The WordFlux API on port 8080 is intentionally LEFT DIRECT (no nginx proxy).
# Rationale:
# 1. It's designed for programmatic access (webhooks, automation, CLI tools)
# 2. Already has security headers in FastAPI application layer
# 3. Adding nginx would complicate deployment without significant benefit
# 4. Port 8080 is a common convention for direct API access
# 5. If security becomes a concern, firewall rules can restrict access to specific IPs
#
# To add nginx proxy for port 8080 in the future, add a server block like:
#
# upstream wordflux_api {
#     server 127.0.0.1:8888;  # Move API to internal port
#     keepalive 32;
# }
#
# server {
#     listen 8080;
#     listen [::]:8080;
#     server_name _;
#
#     location / {
#         proxy_pass http://wordflux_api;
#         # ... same proxy settings as cockpit
#     }
# }
#
# Then update wordflux-api.service: Environment="API_PORT=8888"