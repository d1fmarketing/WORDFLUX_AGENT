# WordFlux Cockpit - Nginx Configuration
# Place in /etc/nginx/sites-available/wordflux-cockpit

upstream wordflux_cockpit {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Accept any hostname

    # Increase buffer sizes for SSE
    proxy_buffers 8 32k;
    proxy_buffer_size 64k;

    # Logging
    access_log /var/log/nginx/wordflux-cockpit.access.log;
    error_log /var/log/nginx/wordflux-cockpit.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Main cockpit UI
    location / {
        proxy_pass http://wordflux_cockpit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Server-Sent Events endpoint (no buffering)
    location /events/stream {
        proxy_pass http://wordflux_cockpit/events/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific settings
        proxy_set_header Connection '';
        proxy_cache off;
        proxy_buffering off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        keepalive_timeout 90s;

        # Headers for SSE
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    # API endpoints
    location ~ ^/(health|board|agent|queue|events) {
        proxy_pass http://wordflux_cockpit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}