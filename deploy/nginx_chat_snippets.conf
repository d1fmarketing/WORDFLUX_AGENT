# Nginx configuration snippets for WordFlux Chat Agent
# Merge these configurations into your existing /etc/nginx/sites-available/wordflux file

# Chat endpoint - no buffering for streaming responses
location /chat {
    proxy_pass http://localhost:8081/chat;
    proxy_http_version 1.1;
    proxy_buffering off;  # Important for streaming responses
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Rate limiting (optional - can also be handled by application)
    # limit_req zone=chat_limit burst=5 nodelay;
}

